endpoints:
  - id: prometheus-metrics
    name: Prometheus指标查询
    description: 从Prometheus获取指标数据
    category: monitoring
    urlTemplate: "http://${promHost}:${promPort}/api/v1/query?query=${query}"
    method: GET
    parameters:
      - name: promHost
        type: string
        description: Prometheus服务器地址
        required: true
        example: "localhost"
      - name: promPort
        type: integer
        description: Prometheus端口
        required: false
        defaultValue: "9090"
      - name: query
        type: string
        description: PromQL查询语句
        required: true
    timeout: 15
    examples:
      - "查询CPU使用率指标"
      - "获取内存使用情况"

  - id: alert-rules
    name: 告警规则列表
    description: 获取当前配置的告警规则列表
    category: monitoring
    urlTemplate: "http://${promHost}:${promPort}/api/v1/rules"
    method: GET
    parameters:
      - name: promHost
        type: string
        description: Prometheus服务器地址
        required: true
      - name: promPort
        type: integer
        description: Prometheus端口
        required: false
        defaultValue: "9090"
    timeout: 10

  - id: alert-alerts
    name: 当前告警列表
    description: 获取当前触发的告警列表
    category: monitoring
    urlTemplate: "http://${promHost}:${promPort}/api/v1/alerts"
    method: GET
    parameters:
      - name: promHost
        type: string
        description: Prometheus服务器地址
        required: true
      - name: promPort
        type: integer
        description: Prometheus端口
        required: false
        defaultValue: "9090"
    timeout: 10
