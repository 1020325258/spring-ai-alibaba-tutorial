endpoints:
  # 1. 合同表查询（支持 contractCode 或 projectOrderId）
  - id: sre-contract
    name: 查询合同
    description: |
      查询合同表（contract）。
      - contractCode：返回单个合同
      - projectOrderId：返回订单下的合同列表
    category: sre-data
    urlTemplate: "${baseUrl}/sre/contract?contractCode=${contractCode}&projectOrderId=${projectOrderId}&app=sreAgent"
    method: GET
    parameters:
      - name: contractCode
        type: string
        description: 合同编号（与 projectOrderId 二选一）
        required: false
        example: "C1767150648920281"
      - name: projectOrderId
        type: string
        description: 订单号（与 contractCode 二选一）
        required: false
        example: "826022518000001562"
    headers:
      X-NRS-User-Id: "1000000000000000"
    timeout: 10

  # 2. 合同节点表
  - id: sre-contract-node
    name: 查询合同节点
    description: 查询合同节点表（contract_node）
    category: sre-data
    urlTemplate: "${baseUrl}/sre/contract-node?contractCode=${contractCode}&app=sreAgent"
    method: GET
    parameters:
      - name: contractCode
        type: string
        description: 合同编号
        required: true
        example: "C1767150648920281"
    headers:
      X-NRS-User-Id: "1000000000000000"
    timeout: 10

  # 3. 签约人表
  - id: sre-contract-user
    name: 查询签约人
    description: 查询签约人表（contract_user），phone 字段为密文
    category: sre-data
    urlTemplate: "${baseUrl}/sre/contract-user?contractCode=${contractCode}&app=sreAgent"
    method: GET
    parameters:
      - name: contractCode
        type: string
        description: 合同编号
        required: true
        example: "C1767150648920281"
    headers:
      X-NRS-User-Id: "1000000000000000"
    timeout: 10

  # 4. 合同扩展字段表（分表）
  - id: sre-contract-field
    name: 查询合同扩展字段
    description: 查询合同扩展字段表（contract_field_sharding_*），分表路由在服务端处理
    category: sre-data
    urlTemplate: "${baseUrl}/sre/contract-field?contractCode=${contractCode}&app=sreAgent"
    method: GET
    parameters:
      - name: contractCode
        type: string
        description: 合同编号
        required: true
        example: "C1767150648920281"
    headers:
      X-NRS-User-Id: "1000000000000000"
    timeout: 10

  # 5. 签约单据表
  - id: sre-contract-quotation-relation
    name: 查询签约单据
    description: 查询签约单据表（contract_quotation_relation）
    category: sre-data
    urlTemplate: "${baseUrl}/sre/contract-quotation-relation?contractCode=${contractCode}&app=sreAgent"
    method: GET
    parameters:
      - name: contractCode
        type: string
        description: 合同编号
        required: true
        example: "C1767150648920281"
    headers:
      X-NRS-User-Id: "1000000000000000"
    timeout: 10

  # 6. 项目配置快照表
  - id: sre-project-config-snap
    name: 查询配置ID
    description: 查询项目配置快照表（project_config_snap）的 contract_config_id
    category: sre-data
    urlTemplate: "${baseUrl}/sre/project-config-snap?projectOrderId=${projectOrderId}&app=sreAgent"
    method: GET
    parameters:
      - name: projectOrderId
        type: string
        description: 订单号
        required: true
        example: "826022518000001562"
    headers:
      X-NRS-User-Id: "1000000000000000"
    timeout: 10

  # 7. 城市公司配置表
  - id: sre-contract-city-company-info
    name: 查询城市公司配置
    description: 查询城市公司配置表（contract_city_company_info）
    category: sre-data
    urlTemplate: "${baseUrl}/sre/contract-city-company-info?businessType=${businessType}&gbCode=${gbCode}&companyCode=${companyCode}&version=${version}&type=${type}&app=sreAgent"
    method: GET
    parameters:
      - name: businessType
        type: integer
        description: 业务类型
        required: true
        example: "1"
      - name: gbCode
        type: integer
        description: 城市编码
        required: true
        example: "110000"
      - name: companyCode
        type: string
        description: 公司编码
        required: true
        example: "C001"
      - name: version
        type: integer
        description: 版本号
        required: true
        example: "1"
      - name: type
        type: integer
        description: 合同类型
        required: true
        example: "1"
    headers:
      X-NRS-User-Id: "1000000000000000"
    timeout: 10
