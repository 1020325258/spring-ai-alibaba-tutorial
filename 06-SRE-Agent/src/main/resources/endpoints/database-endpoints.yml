endpoints:
  - id: db-status
    name: 数据库状态查询
    description: 查询数据库的连接状态和基本信息
    category: database
    urlTemplate: "http://${dbHost}:${dbPort}/api/status"
    method: GET
    parameters:
      - name: dbHost
        type: string
        description: 数据库服务器地址
        required: true
        example: "localhost"
      - name: dbPort
        type: integer
        description: 数据库端口
        required: false
        defaultValue: "3306"
    timeout: 10
    examples:
      - "查询 localhost 数据库的状态"
      - "检查数据库连接是否正常"

  - id: slow-queries
    name: 慢查询分析
    description: 获取数据库的慢查询日志和统计信息
    category: database
    urlTemplate: "http://${dbHost}:${dbPort}/api/slow-queries"
    method: POST
    parameters:
      - name: dbHost
        type: string
        description: 数据库服务器地址
        required: true
      - name: dbPort
        type: integer
        description: 数据库端口
        required: false
        defaultValue: "3306"
      - name: limit
        type: integer
        description: 返回条数限制
        required: false
        defaultValue: "10"
    timeout: 15
