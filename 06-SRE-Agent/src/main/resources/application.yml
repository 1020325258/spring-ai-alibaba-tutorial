server:
  port: 8090

# 本体可视化页面固定端口（ontology.html 始终可通过此端口访问）
ontology:
  web:
    port: 8091
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: sre-agent
  profiles:
    active: local

  # Spring AI Alibaba配置
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-turbo
#          model: qwen3.5-122b-a10b
          enable-thinking: false
  mandatory-file-encoding: UTF-8

# 日志配置
logging:
  file:
    # 显式配置日志目录，logback-spring.xml 通过 springProperty 读取此值
    # 可通过环境变量 -Dlogging.file.path=/absolute/path 覆盖
    path: log
  level:
    root: INFO
    com.yycome.sremate: DEBUG
    org.springframework.ai: DEBUG

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# SRE-Agent 会话记忆配置
sreagent:
  session:
    # 保留最近对话轮次数（每轮包含 user + assistant 各一条消息）
    max-recent-turns: 5
    # 意图识别置信度阈值：低于此值路由到 admin
    confidence-threshold: 0.6
