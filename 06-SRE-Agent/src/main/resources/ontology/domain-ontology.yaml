entities:
  - name: Order
    displayName: "订单"
    aliases: ["项目订单"]
    description: "项目订单，纯数字编号"
    lookupStrategies:
      - field: projectOrderId
        pattern: "^\\d{15,}$"
    attributes:
      - { name: projectOrderId, type: string, description: "订单号，纯数字" }

  - name: Contract
    displayName: "合同"
    aliases: ["合同数据", "合同信息"]
    description: "合同实体，C前缀编号"
    table: contract
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
      - field: projectOrderId
        pattern: "^\\d{15,}$"
    attributes:
      - { name: contractCode,       type: string, description: "合同编号，C前缀+数字" }
      - { name: type,               type: enum,   description: "合同类型" }
      - { name: status,             type: string, description: "合同状态" }
      - { name: amount,             type: number, description: "合同金额" }
      - { name: projectOrderId,     type: string, description: "所属订单号" }
      - { name: platformInstanceId, type: string, description: "协议平台实例 ID" }
      - { name: ctime,              type: string, description: "创建时间" }

  - name: ContractNode
    displayName: "合同节点"
    aliases: ["节点", "流程节点", "合同流程"]
    description: "合同节点/流程节点"
    table: contract_node
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
    attributes:
      - { name: contractCode, type: string, description: "合同编号" }
      - { name: nodeType, type: int, description: "节点类型" }
      - { name: fireTime, type: string, description: "触发时间" }

  - name: ContractQuotationRelation
    displayName: "签约单据"
    aliases: ["合同签约对象", "关联单据", "签约单"]
    description: "合同签约的单据对象，存储合同关联的报价单和S单"
    table: contract_quotation_relation
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
    attributes:
      - { name: contractCode, type: string, description: "合同编号" }
      - { name: billCode, type: string, description: "签约单据编号" }
      - { name: companyCode, type: string, description: "公司编码" }
      - { name: bindType, type: int, description: "绑定类型" }
      - { name: status, type: int, description: "状态" }
      - { name: ctime, type: string, description: "创建时间" }
      - { name: mtime, type: string, description: "修改时间" }

  - name: ContractUser
    displayName: "合同签约人"
    aliases: ["签约人", "合同用户", "业主", "代理人", "代办人"]
    description: "合同签约人信息，包含业主、代理人、公司代办人"
    table: contract_user
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
    attributes:
      - { name: contractCode, type: string, description: "合同编号" }
      - { name: roleType, type: int, description: "用户类型：1-业主 2-代理人 3-公司代办人" }
      - { name: name, type: string, description: "姓名" }
      - { name: phone, type: string, description: "手机号（密文）" }
      - { name: phonePlain, type: string, description: "手机号（明文）" }
      - { name: ucid, type: string, description: "用户ID" }
      - { name: certificateNo, type: string, description: "证件号码" }
      - { name: isSign, type: int, description: "是否签约人：1-是 0-否" }
      - { name: isAuth, type: int, description: "是否认证：1-是 0-否" }
      - { name: ctime, type: string, description: "创建时间" }
      - { name: mtime, type: string, description: "更新时间" }

  - name: ContractField
    displayName: "合同字段"
    aliases: ["合同扩展字段", "字段数据"]
    description: "合同字段数据，按contractCode取模分10张表，返回动态字段 map"
    table: contract_field_sharding
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
    attributes:
      - { name: contractCode, type: string, description: "合同编号" }
      - { name: fields, type: object, description: "动态字段Map，键为字段名，值为字段值" }

  - name: BudgetBill
    displayName: "报价单"
    aliases: ["报价", "预算单"]
    description: "报价单，挂在订单下，通过 projectOrderId 调用 budget-bill-list 接口查询"
    sourceType: http
    endpoint: budget-bill-list
    lookupStrategies:
      - field: projectOrderId
        pattern: "^\\d{15,}$"
    attributes:
      - { name: projectOrderId, type: string, description: "订单号" }
      - { name: billCode, type: string, description: "报价单号" }
      - { name: billType, type: string, description: "报价单类型" }
      - { name: billTypeDesc, type: string, description: "报价单类型描述" }
      - { name: statusDesc, type: string, description: "状态描述" }
      - { name: originalBillCode, type: string, description: "原始报价单号" }

  - name: PersonalQuote
    displayName: "个性化报价"
    aliases: ["个性化报价数据"]
    description: "个性化报价数据，通过签约单据(ContractQuotationRelation)的billCode和bindType查询"
    sourceType: http
    endpoint: contract-personal-data
    lookupStrategies:
      - field: projectOrderId
        pattern: "^\\d{15,}$"
    attributes:
      - { name: projectOrderId, type: string, description: "订单号" }
      - { name: billCode, type: string, description: "报价单号" }
      - { name: personalContractPrice, type: string, description: "个性化报价金额" }
      - { name: organizationCode, type: string, description: "组织编码" }
      - { name: organizationName, type: string, description: "组织名称" }
      - { name: createTime, type: string, description: "创建时间" }
      - { name: quoteFileUrl, type: string, description: "报价文件URL" }
      - { name: quotePrevUrl, type: string, description: "报价预览URL" }

  - name: SubOrder
    displayName: "S单"
    aliases: ["子单", "签约子单", "S单信息"]
    description: "S单，从报价单拆分而来，需要 homeOrderNo + quotationOrderNo 双参数查询"
    sourceType: http
    endpoint: sub-order-info
    lookupStrategies:
      - field: quotationOrderNo
        pattern: ".*"
      - field: homeOrderNo
        pattern: "^\\d{15,}$"
    attributes:
      - { name: orderNo, type: string, description: "S单编号" }
      - { name: projectChangeNo, type: string, description: "变更单号" }
      - { name: mdmCode, type: string, description: "MDM编码" }
      - { name: dueAmount, type: string, description: "应付金额" }
      - { name: status, type: string, description: "S单状态" }

  - name: PersonalSignableOrderInfo
    displayName: "销售合同弹窗可签约S单"
    aliases: ["弹窗S单", "签约弹窗数据", "可签约S单", "销售合同弹窗S单", "个人合同弹窗S单"]
    description: "订单下可签约的S单列表，通过 projectOrderId 直接调用 sign-order-list 接口查询"
    sourceType: http
    endpoint: sign-order-list
    lookupStrategies:
      - field: projectOrderId
        pattern: "^\\d{15,}$"
    attributes:
      - { name: projectOrderId, type: string, description: "订单号" }
      - { name: companyName, type: string, description: "公司名称" }
      - { name: companyCode, type: string, description: "公司编码" }
      - { name: goodsInfo, type: string, description: "商品信息" }
      - { name: orderAmount, type: string, description: "订单金额" }
      - { name: orderCreateTime, type: string, description: "订单创建时间" }
      - { name: bindType, type: int, description: "绑定类型" }
      - { name: bindCode, type: string, description: "绑定编码" }
      - { name: packageInstanceName, type: string, description: "套餐实例名称" }
      - { name: mustSelect, type: int, description: "是否必选" }

  - name: ContractInstance
    displayName: "合同实例"
    aliases: ["实例", "实例信息", "版式", "版式数据", "form_id", "版式ID", "instanceId"]
    description: "协议平台合同实例，存储版式表单数据，通过合同的 platformInstanceId 关联"
    lookupStrategies:
      - field: instanceId
        pattern: ".*"
    attributes:
      - { name: instanceId, type: string, description: "协议平台实例 ID" }
      - { name: formData, type: object, description: "版式表单数据对象" }
      - { name: message, type: string, description: "提示信息，如合同未生成时的说明" }

  - name: FormalSignableOrderInfo
    displayName: "正签合同弹窗可签约S单"
    aliases: ["正签弹窗S单", "正签合同可签约S单", "正签合同弹窗S单"]
    description: "订单下正签合同（type=3）可签约的S单列表，通过 projectOrderId 调用 formalQuotation/list/v2 接口查询"
    sourceType: http
    endpoint: formal-sign-order-list
    lookupStrategies:
      - field: projectOrderId
        pattern: "^\\d{15,}$"
    attributes:
      - { name: projectOrderId, type: string, description: "订单号" }
      - { name: companyName, type: string, description: "公司名称" }
      - { name: companyCode, type: string, description: "公司编码" }
      - { name: goodsInfo, type: string, description: "商品信息" }
      - { name: orderAmount, type: string, description: "订单金额" }
      - { name: orderCreateTime, type: string, description: "订单创建时间" }
      - { name: bindType, type: int, description: "绑定类型" }
      - { name: bindCode, type: string, description: "绑定编码" }
      - { name: packageInstanceName, type: string, description: "套餐实例名称" }
      - { name: mustSelect, type: int, description: "是否必选" }

  - name: ContractConfig
    displayName: "配置表"
    aliases: ["合同配置", "合同配置表"]
    description: "合同城市公司配置数据"
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
    attributes:
      - { name: contractCode, type: string, description: "合同编号" }
      - { name: projectOrderId, type: string, description: "所属订单号" }
      - { name: contractConfigId, type: string, description: "配置快照ID" }
      - { name: version, type: number, description: "配置版本号" }
      - { name: businessType, type: string, description: "业务类型" }
      - { name: gbCode, type: string, description: "区域编码" }
      - { name: companyCode, type: string, description: "公司编码" }
      - { name: type, type: int, description: "合同类型" }
      - { name: typeName, type: string, description: "合同类型名称" }
      - { name: cityCompanyInfo, type: array, description: "城市公司配置列表" }
      - { name: signChannelType, type: int, description: "签约渠道类型" }

relations:
  - from: Order
    to: Contract
    domain: Order
    via: { source_field: projectOrderId, target_field: projectOrderId }

  - from: Order
    to: BudgetBill
    domain: quote
    via: { source_field: projectOrderId, target_field: projectOrderId }

  - from: Contract
    to: ContractNode
    domain: contract
    via: { source_field: contractCode, target_field: contractCode }

  - from: Contract
    to: ContractQuotationRelation
    domain: contract
    description: "合同签约的单据对象"
    via: { source_field: contractCode, target_field: contractCode }

  - from: Contract
    to: ContractUser
    domain: contract
    description: "合同的签约人信息"
    via: { source_field: contractCode, target_field: contractCode }

  - from: Contract
    to: ContractField
    domain: contract
    via: { source_field: contractCode, target_field: contractCode }

  - from: Contract
    to: ContractInstance
    domain: contract
    via: { source_field: platformInstanceId, target_field: instanceId }

  - from: Contract
    to: ContractConfig
    domain: contract
    via: { source_field: contractCode, target_field: contractCode }

  - from: BudgetBill
    to: SubOrder
    domain: quote
    description: "报价单拆分形成S单"
    via: { source_field: billCode, target_field: quotationOrderNo }

  - from: Order
    to: SubOrder
    domain: Order
    description: "订单下S单列表，可按订单号直查"
    via: { source_field: projectOrderId, target_field: homeOrderNo }

  - from: Order
    to: PersonalSignableOrderInfo
    domain: Order
    description: "订单下可签约的S单，直接通过 projectOrderId 查询"
    via: { source_field: projectOrderId, target_field: projectOrderId }

  - from: Order
    to: FormalSignableOrderInfo
    domain: Order
    description: "订单下正签合同可签约的S单，直接通过 projectOrderId 查询"
    via: { source_field: projectOrderId, target_field: projectOrderId }

  - from: ContractQuotationRelation
    to: PersonalQuote
    domain: quote
    description: "签约单据关联个性化报价，通过billCode和bindType查询"
    via: { source_field: billCode, target_field: projectOrderId }


