# SRE-Agent 问答对评估集
#
# 用途：每次迭代后验证 Agent 输出符合预期
# 维护方式：只修改 qa-pairs 列表，无需改代码
#
# 字段说明：
#   id: 唯一标识（测试方法名会使用）
#   question: 用户问题（输入给 Agent）
#   expected: 期望输出的自然语言描述
#

qa-pairs:
  # 排查类场景
  - id: "01"
    question: "订单825123110000002753发起提示无定软电报价，帮我排查"
    expected: "给出排查分析结论，说明该订单是否缺少个性化报价，并给出判断依据"

  # 排查类场景
  - id: "02"
    question: "排查825123110000002753缺少定软电报价"
    expected: "给出排查分析结论，说明该订单是否缺少个性化报价，并给出判断依据"

