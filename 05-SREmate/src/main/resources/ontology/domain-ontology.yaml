entities:
  - name: Order
    displayName: "订单"
    aliases: ["项目订单"]
    description: "项目订单，纯数字编号"
    lookupStrategies:
      - field: projectOrderId
        pattern: "^\\d{15,}$"
    attributes:
      - { name: projectOrderId, type: string, description: "订单号，纯数字" }

  - name: Contract
    displayName: "合同"
    aliases: ["合同数据", "合同信息"]
    description: "合同实体，C前缀编号"
    table: contract
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
      - field: projectOrderId
        pattern: "^\\d{15,}$"
    attributes:
      - { name: contractCode,   type: string, description: "合同编号，C前缀+数字" }
      - { name: contractType,   type: enum,   description: "合同类型" }
      - { name: status,         type: string, description: "合同状态" }
      - { name: projectOrderId, type: string, description: "所属订单号" }
      - { name: platformInstanceId, type: string, description: "协议平台实例 ID" }

  - name: ContractNode
    displayName: "合同节点"
    aliases: ["节点", "流程节点", "合同流程"]
    description: "合同节点/流程节点"
    table: contract_node
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
    attributes:
      - { name: contractCode, type: string }
      - { name: nodeType,     type: string }
      - { name: fireTime,     type: string }

  - name: ContractQuotationRelation
    displayName: "签约单据"
    aliases: ["合同签约对象", "关联单据", "签约单"]
    description: "合同签约的单据对象，存储合同关联的报价单和S单"
    table: contract_quotation_relation
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
    attributes:
      - { name: contractCode, type: string }
      - { name: bill_code,    type: string, description: "签约单据编号" }
      - { name: bind_type,    type: string }
      - { name: status,       type: string }

  - name: ContractField
    displayName: "合同字段"
    aliases: ["合同扩展字段", "字段数据"]
    description: "合同字段数据，按contractCode取模分10张表"
    table: contract_field_sharding
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
    attributes:
      - { name: contractCode, type: string }
      - { name: field_key,    type: string }
      - { name: field_value,  type: string }

  - name: BudgetBill
    displayName: "报价单"
    aliases: ["报价", "预算单"]
    description: "报价单，挂在订单下"
    lookupStrategies:
      - field: projectOrderId
        pattern: "^\\d{15,}$"
    attributes:
      - { name: billCode,       type: string, description: "报价单编号" }
      - { name: projectOrderId, type: string, description: "所属订单号" }

  - name: SubOrder
    displayName: "S单"
    aliases: ["子单", "签约子单"]
    description: "S单，可从报价单或合同两个维度关联"
    lookupStrategies:
      - field: quotationOrderNo
        pattern: ".*"
    attributes:
      - { name: orderNo,          type: string }
      - { name: quotationOrderNo, type: string }
      - { name: contractCode,     type: string }

  - name: ContractForm
    displayName: "版式"
    aliases: ["版式数据", "form_id", "版式ID"]
    description: "合同版式数据"
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
    attributes:
      - { name: contractCode, type: string }

  - name: ContractConfig
    displayName: "配置表"
    aliases: ["合同配置", "合同配置表"]
    description: "合同城市公司配置数据"
    lookupStrategies:
      - field: contractCode
        pattern: "^C\\d+"
    attributes:
      - { name: contractCode, type: string }

relations:
  - from: Order
    to: Contract
    label: has_contracts
    domain: contract
    via: { source_field: projectOrderId, target_field: projectOrderId }

  - from: Order
    to: BudgetBill
    label: has_budget_bills
    domain: quote
    via: { source_field: projectOrderId, target_field: projectOrderId }

  - from: Contract
    to: ContractNode
    label: has_nodes
    domain: contract
    via: { source_field: contractCode, target_field: contractCode }

  - from: Contract
    to: ContractQuotationRelation
    label: has_signed_objects
    domain: contract
    description: "合同签约的单据对象"
    via: { source_field: contractCode, target_field: contractCode }

  - from: Contract
    to: ContractField
    label: has_fields
    domain: contract
    via: { source_field: contractCode, target_field: contractCode }

  - from: Contract
    to: ContractForm
    label: has_form
    domain: contract
    via: { source_field: contractCode, target_field: contractCode }

  - from: Contract
    to: ContractConfig
    label: has_config
    domain: contract
    via: { source_field: contractCode, target_field: contractCode }

  - from: BudgetBill
    to: SubOrder
    label: splits_into
    domain: quote
    description: "报价单拆分形成S单"
    via: { source_field: billCode, target_field: quotationOrderNo }


