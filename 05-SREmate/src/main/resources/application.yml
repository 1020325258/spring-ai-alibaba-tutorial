server:
  port: 0
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: sremate-agent
  profiles:
    active: local

  # Spring AI Alibaba配置
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-turbo
#          model: qwen3.5-122b-a10b
          enable-thinking: false
    # VectorStore配置
    vectorstore:
      elasticsearch:
        enabled: false
        index-name: sremate_knowledge
        initialization-mode: lazy

  # MySQL数据源配置（用于查询业务数据）
  # 敏感配置请在 application-local.yml 中覆盖，该文件已被 .gitignore 忽略
  datasource:
    sre:
      jdbc-url: ${DB_URL:jdbc:mysql://localhost:3306/sre_db?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useAffectedRows=true}
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 5
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

  # Elasticsearch配置（用于RAG知识库向量存储）
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}

  mandatory-file-encoding: UTF-8

# 知识库配置
knowledge:
  loader:
    # 启动时是否自动加载知识库（调用 embedding 模型）
    # 设为 false 可避免启动时消耗 embedding 额度，需要时手动调用加载接口
    enabled: false
    paths:
      - classpath:knowledge/faq/
      - classpath:knowledge/troubleshooting/
      - classpath:knowledge/operations/

# 日志配置
logging:
  level:
    root: INFO
    com.yycome.sremate: DEBUG
    org.springframework.ai: DEBUG

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
